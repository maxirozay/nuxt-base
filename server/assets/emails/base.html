<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
  </head>
  <body>
    <div style="text-align: center; padding: 1em">
      <header>
        <img
          src="{{logo}}"
          alt="logo"
          width="100"
          style="margin-bottom: 2em"
        />
        <h1 style="margin: 0">{{appName}}</h1>
      </header>
      <main style="padding: 3em 0">{{content}}</main>
      <footer>
        <a
          href="{{url}}"
          target="_blank"
        >
          {{url}}
        </a>
      </footer>
    </div>
  </body>
</html>
