<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
  </head>
  <body>
    <div style="text-align: center; padding: 1em; font-family: sans-serif">
      <header>
        <img
          src="{{logo}}"
          alt="logo"
          width="100"
          style="margin-bottom: 2em"
        />
        <h1>{{appName}}</h1>
      </header>
      <div style="margin: 3em 0">{{content}}</div>
      <footer>
        <a
          href="{{url}}"
          target="_blank"
        >
          <small>{{url}}</small>
        </a>
      </footer>
    </div>
    <style>
      .button {
        display: inline-block;
        padding: 1em 1.5em;
        background-color: #000;
        color: #fff;
        font-weight: bold;
        text-decoration: none;
        border-radius: 4px;
      }
    </style>
  </body>
</html>
